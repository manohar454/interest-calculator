<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interest Calculator</title>

<style>
/* ----------- GENERAL UI ----------- */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 520px;
    margin: auto;
}

.card {
    background: #ffffff;
    padding: 20px;
    margin-bottom: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

h2, h3 {
    text-align: center;
    margin-bottom: 15px;
}

/* ----------- INPUTS ----------- */
label {
    font-size: 14px;
    font-weight: 600;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* ----------- BUTTONS ----------- */
button {
    background: #0d6efd;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0b5ed7;
}

.print-btn {
    background: #198754;
}

.print-btn:hover {
    background: #157347;
}

/* ----------- RESULT ----------- */
.result-box {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
    font-size: 14px;
}

/* ----------- CALCULATOR ----------- */
.calc-grid {
    display: flex;
    gap: 10px;
}

.calc-grid input {
    width: 50%;
}

/* ----------- PRINT ONLY STATEMENT ----------- */
@media print {
    body * {
        visibility: hidden;
    }

    #statement, #statement * {
        visibility: visible;
    }

    #statement {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        padding: 20px;
        background: white;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- INTEREST CALCULATOR -->
    <div class="card">
        <h2>Interest Calculator (PN Loan)</h2>

        <input type="text" id="userName" placeholder="Calculated By">
        <input type="text" id="borrowerName" placeholder="Borrower Name">
        <input type="number" id="principal" placeholder="Principal Amount (₹)">
        <input type="number" id="rate" placeholder="Interest Rate (₹ per 100 per month)">

        <label>Start Date</label>
        <input type="date" id="startDate">

        <label>End Date</label>
        <input type="date" id="endDate">

        <button onclick="calculateInterest()">Calculate Interest</button>

        <!-- PRINTABLE STATEMENT -->
        <div id="statement" class="result-box" style="display:none;">
            <h3>Loan Statement</h3>
            <p><strong>Borrower:</strong> <span id="sBorrower"></span></p>
            <p><strong>Calculated By:</strong> <span id="sUser"></span></p>
            <p><strong>Days:</strong> <span id="sDays"></span></p>
            <p><strong>Months:</strong> <span id="sMonths"></span></p>

            <hr>

            <p><strong>Simple Interest:</strong> ₹<span id="sSI"></span></p>
            <p><strong>Total (SI):</strong> ₹<span id="sSITotal"></span></p>

            <p><strong>Compound Interest:</strong> ₹<span id="sCI"></span></p>
            <p><strong>Total (CI):</strong> ₹<span id="sCITotal"></span></p>
        </div>

        <button class="print-btn" onclick="window.print()">Print / Save Statement</button>
    </div>

    <!-- NORMAL CALCULATOR -->
    <div class="card">
        <h3>Normal Calculator</h3>

        <div class="calc-grid">
            <input type="number" id="num1" placeholder="Number 1">
            <input type="number" id="num2" placeholder="Number 2">
        </div>

        <select id="operation">
            <option value="add">Addition (+)</option>
            <option value="sub">Subtraction (-)</option>
            <option value="mul">Multiplication (×)</option>
            <option value="div">Division (÷)</option>
        </select>

        <button onclick="calculate()">Calculate</button>
        <div id="calcResult" class="result-box"></div>
    </div>

</div>

<script>
function calculateInterest() {
    let user = userName.value.trim();
    let borrower = borrowerName.value.trim();
    let P = parseFloat(principal.value);
    let R = parseFloat(rate.value);
    let start = new Date(startDate.value);
    let end = new Date(endDate.value);

    if (!user || !borrower || !P || !R || !startDate.value || !endDate.value) {
        alert("Please fill all fields");
        return;
    }

    let days = Math.round((end - start) / (1000 * 60 * 60 * 24));
    let months = days / 30;

    let SI = (P * R * months) / 100;
    let CI = (P * Math.pow(1 + R / 100, months)) - P;

    document.getElementById("statement").style.display = "block";

    sBorrower.innerText = borrower;
    sUser.innerText = user;
    sDays.innerText = days;
    sMonths.innerText = months.toFixed(2);
    sSI.innerText = SI.toFixed(2);
    sSITotal.innerText = (P + SI).toFixed(2);
    sCI.innerText = CI.toFixed(2);
    sCITotal.innerText = (P + CI).toFixed(2);
}

function calculate() {
    let a = parseFloat(num1.value);
    let b = parseFloat(num2.value);
    let op = operation.value;
    let result = "";

    if (isNaN(a) || isNaN(b)) {
        calcResult.innerHTML = "Enter valid numbers";
        return;
    }

    if (op === "add") result = a + b;
    if (op === "sub") result = a - b;
    if (op === "mul") result = a * b;
    if (op === "div") result = b === 0 ? "Cannot divide by zero" : (a / b);

    calcResult.innerHTML = `<strong>Result:</strong> ${result}`;
}
</script>

</body>
</html>
